
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Atualizar arquivo com Octokit</title>
</head>
<body>
  <button id="enviar">Atualizar arquivo no GitHub</button>

  <script type="module">
    import { Octokit } from "https://esm.sh/@octokit/core";

    const token = ""; // ⚠️ nunca exponha isso em produção!
    const owner = "tiago-creator";
    const repo = "cerimonialista";
    const path = "src/arquivo.txt";

    const octokit = new Octokit({ auth: token });

    document.getElementById("enviar").addEventListener("click", async () => {
      const conteudo = "Conteúdo novo via Octokit!";
      const base64 = btoa(unescape(encodeURIComponent(conteudo)));

      try {
        const response = await octokit.request('PUT /repos/{owner}/{repo}/contents/{path}', {
          owner,
          repo,
          path,
          message: "Atualiza arquivo via Octokit",
          committer: {
            name: "Tiago Creator",
            email: "tiago@exemplo.com"
          },
          content: base64,
          headers: {
            "X-GitHub-Api-Version": "2022-11-28"
          }
        });

        console.log("✅ Arquivo atualizado com sucesso!");
        console.log("Commit URL:", response.data.commit.html_url);
      } catch (err) {
        console.error("❌ Erro ao atualizar arquivo:", err);
      }
    });
  </script>
</body>
</html>
